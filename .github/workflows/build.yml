name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            portable_src: steptrace.exe
            portable_suffix: _x64-portable.exe
          - platform: macos-latest
            target: aarch64-apple-darwin
            portable_src: ""
            portable_suffix: ""
          - platform: macos-latest
            target: x86_64-apple-darwin
            portable_src: ""
            portable_suffix: ""
          - platform: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            portable_src: steptrace
            portable_suffix: _x64-portable

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            pkg-config \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libx11-dev \
            libxrandr-dev \
            libxcomposite-dev \
            libxext-dev \
            libxfixes-dev \
            libxtst-dev \
            libxi-dev \
            libxcb1-dev \
            libxcb-shm0-dev \
            libxcb-randr0-dev \
            libclang-dev \
            libpipewire-0.3-dev \
            libgbm-dev

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*"\([0-9][^"]*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Rename portable binary
        if: matrix.portable_src != ''
        shell: bash
        run: |
          cp "src-tauri/target/${{ matrix.target }}/release/${{ matrix.portable_src }}" \
             "steptrace_${{ steps.version.outputs.version }}${{ matrix.portable_suffix }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: steptrace-${{ matrix.target }}
          path: |
            steptrace_*-portable*
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
          if-no-files-found: ignore

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*
